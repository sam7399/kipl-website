        <!-- Structured data: Organization -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "Krystal Ingredients Private Limited",
                "alternateName": "KIPL",

                    {
                        "@type": "PostalAddress",
                        "addressLocality": "Mumbai",
                        "addressRegion": "Maharashtra",

                    },

                        "@type": "PostalAddress",

                    "@type": "ContactPoint",
                    "contactType": "Sales",
                    "email": "inquiry@krystalingredients.com",
                    "availableLanguage": ["English"]
                },
                "sameAs": []
            }

        <style>
            /* Critical inline CSS to avoid FOUC before bundle hydrates */
            html, body { background: #0A192F; }
            #root { min-height: 100vh; background: #ffffff; }
            .kipl-pre-loader {
                position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
                background: #0A192F; z-index: 9999;
                transition: opacity 0.5s ease, visibility 0.5s ease;
            }
            .kipl-pre-loader.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
            .kipl-pre-loader__mark { width: 56px; height: 56px; animation: kpl-spin 6s linear infinite; }
            @keyframes kpl-spin { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <noscript>
            You need to enable JavaScript to view the Krystal Ingredients website.
        </noscript>
        <div id="root"></div>
        <div class="kipl-pre-loader" id="kipl-pre-loader" aria-hidden="true">
            <svg class="kipl-pre-loader__mark" viewBox="0 0 40 40">
                <polygon points="20,3 35,12 35,28 20,37 5,28 5,12" fill="none" stroke="#10B981" stroke-width="1.6" />
                <circle cx="20" cy="20" r="3" fill="#10B981" />
            </svg>
        </div>
        <script>
            window.addEventListener("load", function () {
                var el = document.getElementById("kipl-pre-loader");
                if (el) {
                    setTimeout(function () { el.classList.add("is-hidden"); }, 200);
                }
            });
        </script>
    </body>
</html>
